<ng-template #textContent let-value>
  @if (enableHighlights()) {
    <app-highlighted-text [text]="value" [maxLength]="maxLength()" />
  } @else {
    <app-truncated-text [text]="value" [maxLength]="maxLength()" />
  }
</ng-template>

@for (value of values(); track $index) {
  @if (asH2()) {
    <h2 [class.font-bold]="bold()" [class.text-lg]="largeFont()">
      <ng-container
        *ngTemplateOutlet="textContent; context: { $implicit: value }"
      />
    </h2>
  } @else {
    <div [class.font-bold]="bold()" [class.text-lg]="largeFont()">
      <ng-container
        *ngTemplateOutlet="textContent; context: { $implicit: value }"
      />
    </div>
  }
}

@if (loading()) {
  <app-loading-spinner size="md" [centered]="false" />
} @else if (error()) {
  <app-error-alert [message]="error()!" />
} @else if (hasResults()) {
  <div class="space-y-2">
    <div class="text-sm text-gray-600 mb-2">
      {{ totalReferringNodes() }}
      {{
        totalReferringNodes() === 1 ? 'object verwijst' : 'objecten verwijzen'
      }}
      naar {{ node().name }}
    </div>

    <app-node-link-list
      [nodes]="referringNodes()"
      [showType]="false"
      [mode]="'image-card'"
    />
  </div>
}

@for (address of addresses(); track $index) {
  <div>
    @if (address.streetAddress) {
      <div>{{ address.streetAddress }}</div>
    }

    @if (address.postalInfo) {
      <div>{{ address.postalInfo }}</div>
    }

    @if (address.regionInfo) {
      <div>{{ address.regionInfo }}</div>
    }
  </div>
}

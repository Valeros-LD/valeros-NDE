@if (nodeValues().length > 0) {
  <div class="flex flex-wrap gap-2">
    @for (nodeValue of nodeValues(); track $index) {
      @if (nodeValue['image']) {
        <app-node-link
          [node]="nodeValue"
          [showType]="false"
          mode="image-card"
        />
      } @else {
        <span class="badge badge-primary py-4 px-4">
          <app-node-link [node]="nodeValue" [showType]="false" />
        </span>
      }
    }
  </div>
}

@if (literalValues().length > 0) {
  <app-text-widget
    [node]="nodeWithLiteralValues()"
    property="literals"
    [config]="textConfig()"
  />
}

<div class="p-4">
  <app-breadcrumb />

  <app-back-to-search />

  @if (loading()) {
    <app-loading-spinner size="lg" padding="lg" />
  } @else if (error()) {
    <app-error-alert [message]="error()!" />
  } @else if (data()) {
    <app-node
      [data]="data()!"
      [clickable]="false"
      [presentationConfig]="presentationConfig()"
    />
  } @else {
    <p>No data available</p>
  }
</div>
